name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build SEA (${{ matrix.target.label }})
    runs-on: ${{ matrix.target.runner }}

    strategy:
      matrix:
        target:
          - label: mac-arm
            runner: macos-14
            asset: mermaid-fixer-mac-arm64
            output: dist/mermaid-fixer-mac-arm64
          - label: mac-x64
            runner: macos-13
            asset: mermaid-fixer-mac-x64
            output: dist/mermaid-fixer-mac-x64
          - label: linux-x64
            runner: ubuntu-latest
            asset: mermaid-fixer-linux-x64
            output: dist/mermaid-fixer-linux-x64
          - label: windows-x64
            runner: windows-latest
            asset: mermaid-fixer-windows-x64.exe
            output: dist/mermaid-fixer-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build SEA executable
        run: npm run package:sea

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.asset }}
          path: ${{ matrix.target.output }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/mermaid-fixer-mac-arm64/mermaid-fixer-mac-arm64
            dist/mermaid-fixer-mac-x64/mermaid-fixer-mac-x64
            dist/mermaid-fixer-linux-x64/mermaid-fixer-linux-x64
            dist/mermaid-fixer-windows-x64.exe/mermaid-fixer-windows-x64.exe
