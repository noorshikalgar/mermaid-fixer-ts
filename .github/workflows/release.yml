name: Release

on:
  push:
    tags:
      - "v*.*.*"   # triggers on tags like v1.0.0, v1.2.3, etc.

permissions:
  contents: write  # needed to create GitHub Releases and upload assets

jobs:
  build:
    name: Build (${{ matrix.target.label }})
    runs-on: ubuntu-latest   # deno compile cross-compiles from any OS

    strategy:
      matrix:
        target:
          - label: mac-arm
            task: build:mac-arm
            asset: mermaid-fixer-mac-arm
          - label: mac-x64
            task: build:mac-x64
            asset: mermaid-fixer-mac-x64
          - label: linux-x64
            task: build:linux
            asset: mermaid-fixer-linux
          - label: windows-x64
            task: build:windows
            asset: mermaid-fixer-windows.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build binary
        run: deno task ${{ matrix.target.task }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.asset }}
          path: dist/${{ matrix.target.asset }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/mermaid-fixer-mac-arm/mermaid-fixer-mac-arm
            dist/mermaid-fixer-mac-x64/mermaid-fixer-mac-x64
            dist/mermaid-fixer-linux/mermaid-fixer-linux
            dist/mermaid-fixer-windows.exe/mermaid-fixer-windows.exe
